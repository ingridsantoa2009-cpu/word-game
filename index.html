<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caça-Palavras</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #009c3b, #ffdf00, #002776);
      margin: 0;
      padding: 10px;
      color: #fff;
    }

    h1 {
      margin-bottom: 10px;
    }

    #word-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 15px;
    }

    .word {
      padding: 5px 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
    }

    .found {
      text-decoration: line-through;
      background: #00ff88;
      color: #000;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      gap: 2px;
      max-width: 95vw;
      margin: auto;
      touch-action: none;
    }

    .cell {
      background: rgba(255,255,255,0.15);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      border-radius: 4px;
      user-select: none;
    }

    .selected {
      background: #ffdf00;
      color: #000;
    }

    .correct {
      background: #00ff88;
      color: #000;
    }

    @media (max-width: 600px) {
      #grid {
        gap: 1px;
      }
    }
  </style>
</head>
<body>

<h1>Caça-Palavras</h1>
<div id="word-list"></div>
<div id="grid"></div>

<script>
const words = [
  "TETEO","CHATO","BOBAO","AMIGO","LEGAL",
  "JOGO","RAP","MC","BIXINHO","COMIDA"
];

const size = 20;
const grid = Array.from({ length: size }, () => Array(size).fill(""));

function placeWord(word) {
  let placed = false;
  while (!placed) {
    let row = Math.floor(Math.random() * size);
    let col = Math.floor(Math.random() * size);
    let dir = Math.floor(Math.random() * 3);

    if (dir === 0 && col + word.length <= size) {
      for (let i = 0; i < word.length; i++) grid[row][col+i] = word[i];
      placed = true;
    }
    if (dir === 1 && row + word.length <= size) {
      for (let i = 0; i < word.length; i++) grid[row+i][col] = word[i];
      placed = true;
    }
    if (dir === 2 && row + word.length <= size && col + word.length <= size) {
      for (let i = 0; i < word.length; i++) grid[row+i][col+i] = word[i];
      placed = true;
    }
  }
}

words.forEach(placeWord);

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
for (let r = 0; r < size; r++) {
  for (let c = 0; c < size; c++) {
    if (!grid[r][c]) {
      grid[r][c] = letters[Math.floor(Math.random() * letters.length)];
    }
  }
}

const gridEl = document.getElementById("grid");
const wordListEl = document.getElementById("word-list");

words.forEach(w => {
  const el = document.createElement("div");
  el.className = "word";
  el.innerText = w;
  wordListEl.appendChild(el);
});

let selected = [];
let isDragging = false;

function getWordFromSelection() {
  return selected.map(c => c.innerText).join("");
}

function clearSelection() {
  selected.forEach(c => c.classList.remove("selected"));
  selected = [];
}

function checkWord() {
  const formed = getWordFromSelection();
  if (words.includes(formed)) {
    selected.forEach(c => c.classList.add("correct"));
    document.querySelectorAll(".word").forEach(w => {
      if (w.innerText === formed) w.classList.add("found");
    });
  }
}

for (let r = 0; r < size; r++) {
  for (let c = 0; c < size; c++) {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.innerText = grid[r][c];

    cell.addEventListener("pointerdown", () => {
      clearSelection();
      isDragging = true;
      selected.push(cell);
      cell.classList.add("selected");
    });

    cell.addEventListener("pointerenter", () => {
      if (isDragging && !selected.includes(cell)) {
        selected.push(cell);
        cell.classList.add("selected");
      }
    });

    cell.addEventListener("pointerup", () => {
      isDragging = false;
      checkWord();
      clearSelection();
    });

    gridEl.appendChild(cell);
  }
}

window.addEventListener("pointerup", () => {
  isDragging = false;
});
</script>

</body>
</html>
